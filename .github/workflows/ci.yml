name: CI - Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔧 Set up test environment
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          ENVIRONMENT: test
          CLOUD_PROJECT_ID: test-project
          FIREBASE_SERVICE_ACCOUNT_B64: dGVzdA==
        run: |
          # Create test environment file
          echo "DATABASE_URL=$DATABASE_URL" >> .env.test
          echo "ENVIRONMENT=$ENVIRONMENT" >> .env.test
          echo "CLOUD_PROJECT_ID=$CLOUD_PROJECT_ID" >> .env.test
          echo "FIREBASE_SERVICE_ACCOUNT_B64=$FIREBASE_SERVICE_ACCOUNT_B64" >> .env.test

      - name: 🚀 Run tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          ENVIRONMENT: test
          CLOUD_PROJECT_ID: test-project
          FIREBASE_SERVICE_ACCOUNT_B64: dGVzdA==
        run: |
          # Run pytest with coverage
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  code-quality:
    name: 📊 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8

      - name: 🔍 Check code formatting
        run: |
          # Check code formatting with black
          black --check --diff app/ tests/

      - name: 🔍 Check import sorting
        run: |
          # Check import sorting with isort
          isort --check-only --diff app/ tests/

      - name: 🔍 Run linting
        run: |
          # Run flake8 for style guide enforcement
          flake8 app/ tests/ --max-line-length=100 --extend-ignore=E203,W503
