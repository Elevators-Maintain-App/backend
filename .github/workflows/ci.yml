name: CI - CD

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "migrations/**"
      - "tests/**"
      - "Dockerfile"
      - "requirements.txt"
      - "test-requirements.txt"
      - "alembic.ini"
      - "docker-compose.yml"
      - "deploy.sh"
      - ".github/workflows/ci.yml"
      - ".github/actions/setup-gcp/**"
  #pull_request:
  #  branches: [main]

jobs:
  build:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v3

      - name: 🔐 Configurar GCP
        uses: ./.github/actions/setup-gcp
        with:
          gpc_credentials: ${{ secrets.VERTIONE_APPLICATION_CREDENTIALS }}
          gpc_project_id: ${{ secrets.VERTIONE_PROJECT_ID }}

      - name: 🐳 Construir y subir imagen Docker
        env:
          GOOGLE_PROJECT: ${{ secrets.VERTIONE_PROJECT_ID }}
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev
          IMAGE=us-central1-docker.pkg.dev/${{ secrets.VERTIONE_PROJECT_ID }}/artifact-registry-vertione/api
          docker build -t $IMAGE .
          docker push $IMAGE

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v3

      - name: 🔐 Configurar GCP
        uses: ./.github/actions/setup-gcp
        with:
          gpc_credentials: ${{ secrets.VERTIONE_APPLICATION_CREDENTIALS }}
          gpc_project_id: ${{ secrets.VERTIONE_PROJECT_ID }}

      - name: 🚀 Desplegar imagen Docker
        env:
          GOOGLE_PROJECT: ${{ secrets.VERTIONE_PROJECT_ID }}
        run: |
          gcloud run deploy vertione \
            --image=us-central1-docker.pkg.dev/${{ secrets.VERTIONE_PROJECT_ID }}/artifact-registry-vertione/api \
            --platform=managed \
            --region=us-central1 \
            --allow-unauthenticated \
            --max-instances=2 \
            --set-env-vars="STORAGE_BUCKET=${{ secrets.STORAGE_BUCKET }},DATABASE_URL=${{ secrets.DATABASE_URL }},CLOUD_PROJECT_ID=${{ secrets.CLOUD_PROJECT_ID }},FIREBASE_SERVICE_ACCOUNT_B64=${{ secrets.FIREBASE_CREDENTIALS }},NOTIFICATION_EMAIL=${{ secrets.NOTIFICATION_EMAIL }},EMAIL_PWD=${{ secrets.EMAIL_PWD }},SMTP_SERVER=${{ secrets.SMTP_SERVER }},SMTP_PORT=${{ secrets.SMTP_PORT }},EMAIL_TIMEOUT=${{ secrets.EMAIL_TIMEOUT }},ENVIRONMENT=production"
