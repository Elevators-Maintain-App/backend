<section
  style="
    width: 100%;
    min-height: 400px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 16px;
  "
>
  <table
    width="400"
    bgcolor="#ffffff"
    cellpadding="0"
    cellspacing="0"
    style="border-radius: 6px; box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px"
  >
    <tr>
      <td align="center" style="padding-top: 16px; padding-bottom: 12px">
        <img
          src="https://storage.googleapis.com/flutterflow-io-6f20.appspot.com/projects/software-mantenimiento-ascensores-ah51ya/assets/uhf76d4us8z9/logo_sin_fondo.png"
          alt="VertiOne"
          width="90"
          style="display: block; margin: auto"
        />
      </td>
    </tr>
    <tr>
      <td align="center" style="padding: 12px 32px 0 32px">
        <h2
          style="
            font-family: sans-serif;
            color: #232629;
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 8px 0;
          "
        >
          Cambiar contraseña
        </h2>
      </td>
    </tr>
    <tr>
      <td align="center" style="padding: 0 32px">
        <p
          style="
            font-family: sans-serif;
            color: #464a4e;
            font-size: 15px;
            line-height: 22px;
            margin: 0 0 24px 0;
          "
        >
          Haz clic en el botón para cambiar la contraseña de tu cuenta en
          <b
            ><span style="color: #91ce51">Verti</span
            ><span style="color: #1e89ff">One</span></b
          >.
        </p>
      </td>
    </tr>
    <tr>
      <td align="center" style="padding: 0 32px 0 32px">
        <a
          href="{{reset_link}}"
          style="
            display: inline-block;
            background-color: #20a3fa;
            color: #fff;
            font-family: sans-serif;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 4px;
            margin-bottom: 24px;
          "
        >
          Cambiar
        </a>
      </td>
    </tr>
    <tr>
      <td align="center" style="padding: 0 32px 32px 32px">
        <p
          style="
            font-family: sans-serif;
            color: #868d96;
            font-size: 13px;
            line-height: 18px;
            margin: 24px 0 0 0;
          "
        >
          Si no has solicitado el cambio de contraseña, ignora este correo.<br />
          Solo una persona con acceso a tu correo puede cambiar la contraseña de
          tu cuenta.
        </p>
      </td>
    </tr>
  </table>
</section>
